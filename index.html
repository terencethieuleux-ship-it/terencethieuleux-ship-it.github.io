<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QoL Game</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Poppins, sans-serif; background: linear-gradient(135deg,#667eea,#764ba2,#f093fb); padding:20px;}
.container { background:white; border-radius:20px; overflow:hidden;}
.header { color:white; padding:40px; text-align:center; background:linear-gradient(135deg,#667eea,#764ba2);}
.hospital-badge {border:2px solid white; padding:8px 16px; border-radius:20px; display:inline-block;}
.hidden {display:none;}
.choice-btn,.diff-btn{padding:12px; margin:5px; cursor:pointer;}
.feedback-box{margin-top:10px; padding:10px; display:none;}
.feedback-correct{background:#d4edda;}
.feedback-incorrect{background:#f8d7da;}
</style>
</head>

<body>
<div class="container">
<div class="header">
<h1>QoL Analyst Game</h1>
<div class="hospital-badge">Non official training platform</div>
</div>

<div>
<button class="diff-btn" onclick="selectDifficulty(event,'easy')">Easy</button>
<button class="diff-btn" onclick="selectDifficulty(event,'normal')">Normal</button>
<button class="diff-btn" onclick="selectDifficulty(event,'hard')">Hard</button>
<button class="diff-btn" onclick="selectDifficulty(event,'expert')">Expert</button>
</div>

<div id="levelSelection">
<button onclick="startLevel(1)">Level 1</button>
<button onclick="startLevel(2)">Level 2</button>
<button onclick="startLevel(3)">Level 3</button>
<button onclick="startLevel(4)">Level 4</button>
</div>

<div id="levelContainer" class="hidden">
<h3 id="title"></h3>
<p id="desc"></p>

<div id="chartBox" class="hidden">
<canvas id="chart"></canvas>
</div>

<div id="options"></div>
<div id="feedback" class="feedback-box"></div>

<button onclick="back()">Back</button>
</div>

<div id="report" class="hidden"></div>
</div>

<script>
let gameState = {
difficulty:'normal',
level:0,
score:0,
correct:0,
total:0
};

const questions = {
easy:{
1:{title:"Missing data?",desc:"What first?",opts:[
{text:"Check missing values",correct:true},
{text:"Delete all",correct:false}
]},
2:{title:"Best chart?",desc:"QoL vs stage",opts:[
{text:"Line chart",correct:true},
{text:"Pie chart",correct:false}
]},
3:{title:"Compare 2 groups",desc:"Test?",opts:[
{text:"t-test",correct:true},
{text:"correlation",correct:false}
]},
4:{title:"Conclusion",desc:"What to do?",opts:[
{text:"Focus advanced care",correct:true},
{text:"Ignore data",correct:false}
]}
},
hard:{
1:{title:"MCAR handling",desc:"Best method?",opts:[
{text:"Listwise deletion",correct:true},
{text:"Mean imputation",correct:false}
]},
2:{title:"Multi variable viz",desc:"Best?",opts:[
{text:"Facet plots",correct:true},
{text:"Pie charts",correct:false}
]},
3:{title:"Non-normal data",desc:"Test?",opts:[
{text:"Kruskal-Wallis",correct:true},
{text:"ANOVA",correct:false}
]},
4:{title:"Small effect",desc:"Interpret?",opts:[
{text:"Not clinically meaningful",correct:true},
{text:"Act immediately",correct:false}
]}
}
};

function selectDifficulty(e,d){
gameState.difficulty=d;
document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
e.currentTarget.classList.add('active');
}

function startLevel(l){
gameState.level=l;

document.getElementById('levelSelection').classList.add('hidden');
document.getElementById('levelContainer').classList.remove('hidden');

const q = questions[gameState.difficulty][l];

document.getElementById('title').textContent=q.title;
document.getElementById('desc').textContent=q.desc;

const optDiv=document.getElementById('options');
optDiv.innerHTML="";

q.opts.forEach(o=>{
let b=document.createElement('button');
b.className='choice-btn';
b.textContent=o.text;
b.onclick=()=>answer(o.correct);
optDiv.appendChild(b);
});

drawChart(l);
}

function answer(correct){
let fb=document.getElementById('feedback');
fb.style.display='block';

if(correct){
gameState.score+=10;
gameState.correct++;
fb.className="feedback-box feedback-correct";
fb.textContent="Correct decision.";
}else{
gameState.score+=3;
fb.className="feedback-box feedback-incorrect";
fb.textContent="Not optimal.";
}

gameState.total++;

setTimeout(()=>{
if(gameState.level<4) startLevel(gameState.level+1);
else showReport();
},1500);
}

function drawChart(l){
let box=document.getElementById('chartBox');
if(l===1||l===2){
box.classList.remove('hidden');
new Chart(document.getElementById('chart'),{
type:l===1?'bar':'line',
data:{
labels:['A','B','C','D'],
datasets:[{data:[10,20,30,40]}]
}
});
}else{
box.classList.add('hidden');
}
}

function showReport(){
document.getElementById('levelContainer').classList.add('hidden');
document.getElementById('report').classList.remove('hidden');
document.getElementById('report').innerHTML=`
Score: ${gameState.score}<br>
Accuracy: ${Math.round(gameState.correct/gameState.total*100)}%
`;
}

function back(){
document.getElementById('levelContainer').classList.add('hidden');
document.getElementById('levelSelection').classList.remove('hidden');
}
</script>

</body>
</html>
